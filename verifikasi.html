<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Verifikasi Pendaftaran PPDB</title>
<link rel="stylesheet" href="style.css">

<style>

body{
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
  url('gambar-sekolah.jpg') no-repeat center center fixed;
  background-size:cover;
  color:#fff;
  font-family:'Poppins',sans-serif;
  text-align:center;
  padding:40px;
}

.box{
  max-width:600px;
  margin:auto;
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:10px;
}

h1{
  margin-bottom:20px;
}

.data{
  text-align:left;
  margin-top:20px;
  line-height:1.8;
}

.btn-wa{
  display:inline-block;
  margin-top:30px;
  padding:14px 30px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-size:18px;
  font-weight:bold;
  transition:0.3s;
}

.btn-wa:hover{
  background:#1ebe5d;
  transform:scale(1.05);
}
.btn-kembali{
  display:inline-block;
  margin-top:15px;
  padding:12px 28px;
  background:#f39c12;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

.btn-kembali:hover{
  background:#e67e22;
  transform:scale(1.05);
}

</style>
</head>

<body>

<div class="box">

<h1>Verifikasi Data Pendaftaran</h1>

<p>Periksa kembali data pendaftaran Anda sebelum mengirim ke admin sekolah.</p>

<div class="data" id="tampilData"></div>

<button class="btn-wa" onclick="kirimWA()">
📨 Kirim Pendaftaran ke WhatsApp


</button>
<a href="daftar.html" class="btn-kembali">
⬅ Kembali Perbaiki Data
</a>
</div>

<script>

let params = new URLSearchParams(window.location.search);
let pesan = params.get("pesan");

document.getElementById("tampilData").innerText = pesan;

function kirimWA(){

let nomor = "62877734686477";

let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

window.open(url, "_blank");

}

</script>

</body>
</html>
