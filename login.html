<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Wali Murid | SDN 1 Sukamanah</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('gambar-sekolah.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.login-box {
  background: rgba(255,255,255,0.15);
  padding: 40px 30px;
  border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  text-align: center;
  width: 100%;
  max-width: 400px;
  backdrop-filter: blur(5px);
}

.login-box h2 {
  color: #ffeb3b;
  margin-bottom: 25px;
  text-shadow: 1px 1px 8px rgba(0,0,0,0.7);
  font-size: 26px;
}

.login-box input {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
}

.login-box input:focus {
  box-shadow: 0 0 10px #ffd54f;
}

.login-box button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: #ffd54f;
  color: #333;
  border: none;
  border-radius: 30px;
  font-weight: 600;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.login-box button:hover {
  background: #ffb300;
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(255,179,0,0.8);
}

.login-box p {
  font-size: 14px;
  color: #fff;
  margin-top: 12px;
}
a.home-btn{
    position: fixed;   /* supaya menempel di layar */
    top: 10px;         /* jarak dari atas */
    left: 10px;        /* jarak dari kiri */
    display:inline-block;
    padding:10px 15px;
    background:#e68900;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
</style>
</head>
<a href="index.html" class="home-btn">← Home</a>
<body>


<div class="login-box">
  <h2>Portal Wali Murid</h2>
  <p>Masukkan NISN siswa dan PIN* untuk login.</p>
  <form id="loginForm">
    <input type="text" name="nisn" placeholder="Masukkan NISN" required>
    <input type="text" name="pin" placeholder="Masukkan PIN" required>
    <button type="submit">Lihat Nilai</button>
	<p style="font-size:12px; color:#fff; margin-top:8px;">*Untuk mendapatkan PIN hubungi wali kelas</p>
  </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const nisn = document.querySelector("input[name='nisn']").value.trim();
    const pin = document.querySelector("input[name='pin']").value.trim();

    localStorage.setItem("nisn", nisn);
    localStorage.setItem("pin", pin);

    // Tetap arahkan ke halaman nilai
    window.location.href = "nilai/nilai.html";
});
</script>

</body>
</html>
