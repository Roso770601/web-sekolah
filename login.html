<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Orang Tua | SDN 1 Sukamanah</title>

<style>
/* ================= GLOBAL ================= */
*{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
body{
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('../gambar-sekolah.jpg') no-repeat center center fixed;
  background-size:cover; color:#fff; line-height:1.6; height:100vh; display:flex; justify-content:center; align-items:center;
}

/* ================= FORM BOX ================= */
.login-box{
  background: rgba(255,255,255,0.1);
  padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3); text-align:center;
  width:100%; max-width:400px;
}
.login-box h2{
  color:#ffeb3b; margin-bottom:20px; text-shadow: 1px 1px 5px black;
}
.login-box input{
  width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; font-size:16px;
}
.login-box button{
  width:100%; padding:12px; margin-top:15px; background:#ffd54f; color:#333; border:none; border-radius:30px; font-weight:600; cursor:pointer; transition:0.3s;
}
.login-box button:hover{ background:#ffb300; transform:scale(1.03); box-shadow:0 0 20px rgba(255,179,0,0.8); }

/* ================= INFO TEXT ================= */
.login-box p{
  font-size:14px; color:#fff; margin-top:10px;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Portal Wali Murid</h2>
  <p style="font-size:13px;color:#fff;text-align:center;">
Masukkan NISN siswa dan PIN.
</p>
  <form id="loginForm">
    <input type="text" name="nisn" placeholder="Masukkan NISN" required>
    <input type="text" name="pin" placeholder="Masukkan PIN" required>
    <button type="submit">Lihat Nilai</button>
  </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const nisn = document.querySelector("input[name='nisn']").value.trim();
    const pin = document.querySelector("input[name='pin']").value.trim();

    // simpan ke localStorage untuk halaman nilai
    localStorage.setItem("nisn", nisn);
    localStorage.setItem("pin", pin);

    // arahkan ke halaman nilai
    window.location.href = "/nilai/";
});
</script>

</body>
</html>
