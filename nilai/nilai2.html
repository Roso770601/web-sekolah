<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilai Siswa | SDN 1 Sukamanah</title>

<style>

body{
  background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url('../gambar-sekolah.jpg') no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center; 
}

.card{
  background:white;
  padding:30px;
  border-radius:18px;
  width:100%;
  max-width:480px;
  text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.logo{
  width:65px;
  margin-bottom:10px;
}

/* 🔥 JUDUL DIPERHALUS */
h2{
  color:#2c3e50;
  font-size:20px;
  margin-bottom:5px;
}

/* SUBTITLE */
.subtitle{
  font-size:13px;
  color:#777;
  margin-bottom:15px;
}

/* DATA SISWA */
#hasil h3{
  font-size:18px;
  margin-bottom:5px;
  color:#333;
}

#hasil p{
  font-size:14px;
  color:#444;
  margin:2px 0;
}

/* TABEL */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.label{
  font-weight:500;
  color:#333;
}

.nilai{
  font-weight:bold;
  text-align:right;
}

/* WARNA NILAI */
.hijau{
  color:#2e7d32;
}

.kuning{
  color:#f9a825;
}

.merah{
  color:#c62828;
}

/* GARIS PEMISAH */
hr{
  border:none;
  border-top:2px solid #f1c40f;
  margin:15px 0;
}

/* TOMBOL */
.action-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 16px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
  transition:0.3s;
}

.home{
  background:#3498db;
  color:white;
}

.logout{
  background:#e74c3c;
  color:white;
}

.print{
  background:#2ecc71;
  color:white;
}

.btn:hover{
  opacity:0.9;
  transform:scale(1.05);
}

.error{
  color:red;
  font-weight:bold;
}

/* PRINT */
@media print{

body{
  background:white;
}

.card{
  box-shadow:none;
}

.action-buttons{
  display:none;
}

}

</style>
</head>

<body>

<div class="card">

<img src="../logo.png" class="logo">

<h2>Nilai Tengah Semester Genap 2026/2027</h2>
<div class="subtitle">SDN 1 Sukamanah</div>

<div id="countdown"></div>
<div id="hasil" style="display:none;">Memuat data...</div>

<div class="action-buttons">

<button class="btn home" onclick="window.location.href='/'">
🏠 Beranda
</button>

<button class="btn logout" onclick="logout()">
🔍 Cari Siswa Lagi
</button>

<button class="btn print" onclick="window.print()">
🖨 Cetak Nilai
</button>

</div>

</div>

<script>

const waktuRilis = new Date("Jun 01, 2025 10:00:00").getTime();

const nisn = localStorage.getItem("nisn");
const pin = localStorage.getItem("pin");

if(!nisn || !pin){
window.location.href = "../login.html";
}

function mulaiCountdown(){

const sekarang = new Date().getTime();
const jarak = waktuRilis - sekarang;

const countdown = document.getElementById("countdown");
const hasil = document.getElementById("hasil");

if(jarak > 0){

const hari = Math.floor(jarak / (1000 * 60 * 60 * 24));
const jam = Math.floor((jarak % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const menit = Math.floor((jarak % (1000 * 60 * 60)) / (1000 * 60));
const detik = Math.floor((jarak % (1000 * 60)) / 1000);

countdown.innerHTML =
"<h3>Pengumuman Nilai Akan Dibuka Dalam</h3>" +
"<h2>"+hari+" Hari "+jam+" Jam "+menit+" Menit "+detik+" Detik</h2>";

setTimeout(mulaiCountdown,1000);

}else{

countdown.style.display="none";
hasil.style.display="block";
loadNilai();

}

}

mulaiCountdown();

function loadNilai(){

fetch("data.json")
.then(res => res.json())
.then(data => {

const siswa = data.find(s => s.nisn === nisn);

const hasil = document.getElementById("hasil");

if(!siswa){
hasil.innerHTML = "<p class='error'>Data tidak ditemukan</p>";
return;
}

let html = `
<h3>${siswa.nama}</h3>
<p><b>NISN :</b> ${siswa.nisn}</p>
<p><b>Kelas :</b> ${siswa.kelas}</p>
<p><b>Tanggal Lahir :</b> ${siswa.tgl_lahir}</p>

<hr style="border:none; border-top:3px solid #FFD700; margin:15px 0;">

<table>
`;

for (let key in siswa) {

if (['nisn','pin','nama','kelas','tgl_lahir'].includes(key)) continue;

let namaMapel = key
.replace(/_/g," ")
.replace(/\b\w/g,c => c.toUpperCase());

html += `
<tr>
<td class="label">${namaMapel}</td>
<td class="nilai ${warnaNilai(siswa[key])}">${tampilNilai(siswa[key])}</td>
</tr>
`;

}

html += "</table>";

hasil.innerHTML = html;

})
.catch(err => {

document.getElementById("hasil").innerHTML = "<p class='error'>Gagal memuat data.</p>";

});

}

function tampilNilai(n){

if (!n || n === "NaN") return "-";

return n;

}

function warnaNilai(n){

n = Number(n);

if (n >= 80) return "hijau";
if (n >= 60) return "kuning";
return "merah";

}

function logout(){

localStorage.removeItem("nisn");
localStorage.removeItem("pin");

window.location.href="../login.html";

}

</script>

</body>
</html>
