<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilai Siswa</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
text-align:center;
}

.box{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}
</style>
</head>

<body>

<div class="box">
<h2>Data Nilai Siswa</h2>

<div id="hasil">Memuat data...</div>

</div>

<script>

const nisn = localStorage.getItem("nisn");
const tgl = localStorage.getItem("tgl_lahir");

fetch('data.json')
.then(res => res.json())
.then(data => {

let siswa = data.find(s => 
s.nisn === nisn && s.tgl_lahir === tgl
);

if(!siswa){
document.getElementById("hasil").innerHTML = "Data tidak ditemukan";
return;
}

document.getElementById("hasil").innerHTML = `
<table>
<tr><td>Nama</td><td>${siswa.nama}</td></tr>
<tr><td>NISN</td><td>${siswa.nisn}</td></tr>
<tr><td>Tanggal Lahir</td><td>${siswa.tgl_lahir}</td></tr>
<tr><td>Matematika</td><td>${siswa.matematika}</td></tr>
<tr><td>Bahasa Indonesia</td><td>${siswa.bahasa_indonesia}</td></tr>
<tr><td>PPKN</td><td>${siswa.ppkn}</td></tr>
<tr><td>IPA</td><td>${siswa.ipa}</td></tr>
<tr><td>IPS</td><td>${siswa.ips}</td></tr>
</table>
`;

});

</script>

</body>
</html>
