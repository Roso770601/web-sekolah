<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilai Siswa | SDN 1 Sukamanah</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url('../gambar-sekolah.jpg');
background-size:cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{

background:white;
padding:35px;
border-radius:20px;
width:100%;
max-width:500px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

.logo{
width:70px;
margin-bottom:10px;
}

h2{
color:#1976d2;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.label{
font-weight:bold;
}

.btn{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:600;
}

.print{
background:#4caf50;
color:white;
}

.logout{
background:#e53935;
color:white;
margin-left:10px;
}

.error{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<img src="../logo.png" class="logo">

<h2>Portal Nilai Siswa</h2>

<div id="hasil">Memuat data...</div>

<div style="margin-top:20px">
<button class="btn print" onclick="window.print()">Cetak Nilai</button>
<button class="btn logout" onclick="logout()">Logout</button>
</div>

</div>

<script>

const nisn = localStorage.getItem("nisn");
const tgl = localStorage.getItem("tgl_lahir");

if(!nisn || !tgl){
window.location.href = "/login.html";
}

fetch("data.json")
.then(res => res.json())
.then(data => {

let siswa = data.find(s =>
s.nisn === nisn && s.tgl_lahir === tgl
);

const hasil = document.getElementById("hasil");

if(!siswa){
hasil.innerHTML = "<p class='error'>Data tidak ditemukan</p>";
return;
}

hasil.innerHTML = `
<h3>${siswa.nama}</h3>
<p><b>NISN :</b> ${siswa.nisn}</p>
<p><b>Tanggal Lahir :</b> ${siswa.tgl_lahir}</p>

<table>
<tr><td class="label">Matematika</td><td>${siswa.matematika}</td></tr>
<tr><td class="label">Bahasa Indonesia</td><td>${siswa.bahasa_indonesia}</td></tr>
<tr><td class="label">PPKN</td><td>${siswa.ppkn}</td></tr>
<tr><td class="label">IPAS</td><td>${siswa.ipaS}</td></tr>
<tr><td class="label">PJOK</td><td>${siswa.pjok}</td></tr>
<tr><td class="label">seni rupa</td><td>${siswa.seni_rups}</td></tr>
</table>
`;

});

function logout(){

localStorage.removeItem("nisn");
localStorage.removeItem("tgl_lahir");

window.location.href="/login.html";

}

</script>

</body>
</html>
