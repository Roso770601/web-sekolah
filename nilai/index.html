<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilai Siswa</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
text-align:center;
}

.box{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}
</style>
</head>

<body>

<div class="box">
<h2>Data Nilai Siswa</h2>

<div id="hasil">Memuat data...</div>

</div>

<<script>

const nisn = localStorage.getItem("nisn");
const tgl = localStorage.getItem("tgl_lahir");

if(!nisn || !tgl){
    window.location.href = "/login.html";
}

fetch('data.json')
.then(res => res.json())
.then(data => {

let siswa = data.find(s => 
s.nisn === nisn && s.tgl_lahir === tgl
);

const card = document.getElementById("nilaiCard");

if(!siswa){
card.innerHTML = "Data tidak ditemukan";
return;
}

card.innerHTML = `
<h2>${siswa.nama}</h2>
<p>NISN : ${siswa.nisn}</p>
<p>Matematika : ${siswa.matematika}</p>
<p>Bahasa Indonesia : ${siswa.bahasa_indonesia}</p>
<p>PPKN : ${siswa.ppkn}</p>
<p>IPA : ${siswa.ipa}</p>
<p>IPS : ${siswa.ips}</p>
`;

});
</script>

</body>
</html>
