<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Nilai | SDN 1 Sukamanah</title>

<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
body{
    background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('../gambar-sekolah.jpg') no-repeat center center fixed;
    background-size:cover; color:#fff; line-height:1.6; min-height:100vh;
    display:flex; justify-content:center; align-items:center;
}

/* CARD NILAI */
#nilaiCard{
    background: rgba(255,255,255,0.15); /* sedikit transparan, gambar tetap terlihat */
    padding:40px; border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3); width:100%; max-width:500px;
    text-align:center;
}

/* LOGO SEKOLAH */
#logo{
    width:80px; height:80px; object-fit:contain; margin-bottom:15px;
}

/* NAMA */
#nilaiCard h2{
    color:#ffeb3b; margin-bottom:10px; text-shadow:1px 1px 5px black;
    font-size:26px;
}

/* INFO SISI */
.info{
    background: rgba(0,0,0,0.3); padding:10px 15px; border-radius:10px;
    display:inline-block; margin:5px 0; font-size:16px;
}

/* HR */
#nilaiCard hr{
    border:none; border-top:1px solid #ffd54f; margin:15px 0;
}

/* NILAI */
#nilaiCard .nilai{
    text-align:left; margin:8px 0;
}

/* ERROR */
.error{
    color:#ff5252; font-weight:bold;
}
</style>
</head>
<body>

<div id="nilaiCard">
  <h2>Memuat data...</h2>
</div>

<script>
const nisn = localStorage.getItem('nisn');
const pin = localStorage.getItem('pin');

fetch('data.json')
.then(res => res.json())
.then(data => {
    const siswa = data.find(s => s.nisn === nisn && s.pin === pin);
    const card = document.getElementById('nilaiCard');

    if(siswa){
        card.innerHTML = `
            <img id="logo" src="../logo-sekolah.png" alt="Logo Sekolah">
            <h2>${siswa.nama}</h2>

            <div class="info"><b>NISN :</b> ${siswa.nisn}</div><br>
            <div class="info"><b>KELAS :</b> ${siswa.kelas}</div><br>
            <div class="info"><b>Tanggal Lahir :</b> ${siswa.tgl_lahir}</div>

            <hr>

            <div class="nilai"><b>Matematika :</b> ${siswa.matematika}</div>
            <div class="nilai"><b>Bahasa Indonesia :</b> ${siswa.bahasa_indonesia}</div>
            <div class="nilai"><b>PPKN :</b> ${siswa.ppkn}</div>
            <div class="nilai"><b>IPA/IPAS :</b> ${siswa.ipas}</div>
            <div class="nilai"><b>PJOK :</b> ${siswa.pjok}</div>
            <div class="nilai"><b>Seni Rupa :</b> ${siswa.seni_rupa}</div>
        `;
    } else {
        card.innerHTML = '<p class="error">Data tidak ditemukan! Pastikan NISN dan PIN benar.</p>';
    }
})
.catch(err => {
    document.getElementById('nilaiCard').innerHTML = '<p class="error">Gagal memuat data. Cek koneksi atau file data.json!</p>';
});
</script>

</body>
</html>
