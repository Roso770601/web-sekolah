<script>

const nisn = localStorage.getItem('nisn');
const tgl = localStorage.getItem('tgl_lahir');

fetch('data.json')
.then(res => res.json())
.then(data => {

const siswa = data.find(s => s.nisn === nisn && s.tgl_lahir === tgl);

const card = document.getElementById('nilaiCard');

if(siswa){

card.innerHTML = `
<h2>Nilai Siswa</h2>

<p><b>Nama:</b> ${siswa.nama}</p>
<p><b>NISN:</b> ${siswa.nisn}</p>
<p><b>Tanggal Lahir:</b> ${siswa.tgl_lahir}</p>

<hr>

<p><b>Matematika:</b> ${siswa.matematika}</p>
<p><b>Bahasa Indonesia:</b> ${siswa.bahasa_indonesia}</p>
<p><b>PPKN:</b> ${siswa.ppkn}</p>
<p><b>IPA:</b> ${siswa.ipa}</p>
<p><b>IPS:</b> ${siswa.ips}</p>
`;

}else{

card.innerHTML = '<p class="error">Data tidak ditemukan! Pastikan NISN dan Tanggal Lahir benar.</p>';

}

});

</script>
