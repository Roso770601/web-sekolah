<style>

body{
background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('gambar-sekolah.jpg') no-repeat center center fixed;
background-size:cover;
font-family:Poppins,sans-serif;
margin:0;
padding:40px;
text-align:center;
color:white;
}

h1{
color:#ffeb3b;
margin-bottom:25px;
}

/* tombol kategori */

.filter-btn{
margin:5px;
padding:10px 18px;
border:none;
border-radius:20px;
background:#1976d2;
color:white;
cursor:pointer;
font-weight:600;
}

.filter-btn:hover{
background:#0d47a1;
}

/* grid galeri */

.galeri-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
max-width:1100px;
margin:auto;
margin-top:25px;
}

.galeri-grid img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.galeri-grid img:hover{
transform:scale(1.05);
}

/* tombol kembali */

.back{
display:inline-block;
margin-top:30px;
padding:12px 25px;
background:#1976d2;
color:white;
text-decoration:none;
border-radius:25px;
}

/* LIGHTBOX */

#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

#close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

#prev, #next{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
cursor:pointer;
padding:10px;
user-select:none;
}

#prev{ left:20px; }
#next{ right:20px; }

#prev:hover, #next:hover{
color:#ffeb3b;
}

</style>
</head>

<!-- LIGHTBOX -->

<div id="lightbox">
<span id="close">&times;</span>
<img id="lightbox-img">
<span id="prev">&#10094;</span>
<span id="next">&#10095;</span>
</div>

<script>

/* FILTER GALERI */

function filterSelection(category){
let images=document.querySelectorAll(".galeri-grid img");

images.forEach(img=>{
if(category==="all"){
img.style.display="block";
}else{
if(img.classList.contains(category)){
img.style.display="block";
}else{
img.style.display="none";
}
}
});
}

/* LIGHTBOX */

const images = document.querySelectorAll(".galeri-grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const close = document.getElementById("close");
const next = document.getElementById("next");
const prev = document.getElementById("prev");

let currentIndex = 0;

// buka gambar
images.forEach((img, index)=>{
img.onclick=()=>{
lightbox.style.display="flex";
lightboxImg.src=img.src;
currentIndex = index;
}
});

// next
next.onclick = (e)=>{
e.stopPropagation();
currentIndex = (currentIndex + 1) % images.length;
lightboxImg.src = images[currentIndex].src;
};

// prev
prev.onclick = (e)=>{
e.stopPropagation();
currentIndex = (currentIndex - 1 + images.length) % images.length;
lightboxImg.src = images[currentIndex].src;
};

// swipe HP
let startX = 0;

lightbox.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e=>{
let endX = e.changedTouches[0].clientX;

if(startX - endX > 50){
next.click();
}
if(endX - startX > 50){
prev.click();
}
});

// close
close.onclick = ()=>{lightbox.style.display="none";}
lightbox.onclick = ()=>{lightbox.style.display="none";}

</script>

</body>
